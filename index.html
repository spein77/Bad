<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Biabu Floral Art</title>
<style>
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5;padding:20px;margin:0;}
.container{max-width:900px;margin:0 auto;background:#fff;padding:40px;border-radius:15px;box-shadow:0 5px 25px rgba(0,0,0,0.1);}
h1{color:#8B0000;margin-bottom:10px;}
h3{margin-top:30px;color:#333;border-bottom:2px solid #8B0000;padding-bottom:10px;}
input,textarea,button{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-size:1rem;font-family:inherit;}
button{background:#8B0000;color:#fff;border:none;font-weight:700;cursor:pointer;transition:0.3s;}
button:hover{background:#6B0000;}
button:disabled{background:#999;cursor:not-allowed;}
.item{background:#f9f9f9;padding:15px;border-radius:10px;margin:10px 0;display:flex;gap:15px;align-items:center;}
.item img{width:100px;height:100px;object-fit:cover;border-radius:10px;}
.preview{max-width:250px;margin:10px 0;border-radius:10px;display:none;}
.delete{background:#dc3545;}
.delete:hover{background:#c82333;}
label{display:block;margin-top:15px;font-weight:600;color:#555;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
@media(max-width:700px){.grid-2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
  <h1>⚙️ Admin Panel - Biabu Floral Art</h1>
  <p style="color:#666;">Hapa ndipo utaongeza na kuhariri kazi zako</p>

  <h3>Mipangilio ya Biashara</h3>
  <label>Logo / Picha ya Profile:</label>
  <input type="file" id="logoUpload" accept="image/*">
  <img id="logoPreview" class="preview">

  <div class="grid-2">
    <div>
      <label>Jina la Biashara:</label>
      <input type="text" id="bizName" value="Biabu Floral Art">
    </div>
    <div>
      <label>Namba ya Simu:</label>
      <input type="text" id="phone" value="0775667472">
    </div>
  </div>

  <label>Mahali Mnapatikana:</label>
  <input type="text" id="location" value="Morogoro, Tanzania">
  <button onclick="saveSettings()">💾 Hifadhi Mipangilio</button>

  <h3>Ongeza Kazi Mpya</h3>
  <label>Chagua Picha:</label>
  <input type="file" id="imgUpload" accept="image/*">
  <img id="imgPreview" class="preview">

  <div class="grid-2">
    <div>
      <label>Jina la Design/Mauwa:</label>
      <input type="text" id="title" placeholder="Mfano: Piko ya Kiarabu">
    </div>
    <div>
      <label>Bei:</label>
      <input type="text" id="price" placeholder="Mfano: 45,000">
    </div>
  </div>

  <label>Maelezo:</label>
  <textarea id="desc" placeholder="Maelezo mafupi kuhusu kazi hii" rows="3"></textarea>
  <button id="addBtn" onclick="addItem()">➕ Ongeza Kwenye Gallery</button>

  <h3>Kazi Zilizopo</h3>
  <div id="itemsList"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('biabuData')) || {
  logo:'', name:'Biabu Floral Art', phone:'0775667472',
  location:'Morogoro, Tanzania', items:[]
};

let tempImg = '';

function fileToBase64(file, callback){
  const reader = new FileReader();
  reader.onload = () => callback(reader.result);
  reader.readAsDataURL(file);
}

document.getElementById('logoUpload').onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;
  fileToBase64(file, base64=>{
    data.logo = base64;
    document.getElementById('logoPreview').src = base64;
    document.getElementById('logoPreview').style.display = 'block';
  });
};

document.getElementById('imgUpload').onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;
  fileToBase64(file, base64=>{
    tempImg = base64;
    document.getElementById('imgPreview').src = base64;
    document.getElementById('imgPreview').style.display = 'block';
  });
};

function saveSettings(){
  data.name = document.getElementById('bizName').value;
  data.phone = document.getElementById('phone').value;
  data.location = document.getElementById('location').value;
  localStorage.setItem('biabuData', JSON.stringify(data));
  alert('✅ Mipangilio imehifadhiwa!');
}

function addItem(){
  if(!tempImg){alert('Tafadhali chagua picha kwanza');return;}
  if(!document.getElementById('title').value){alert('Weka jina la kazi');return;}

  const item = {
    img: tempImg,
    title: document.getElementById('title').value,
    desc: document.getElementById('desc').value,
    price: document.getElementById('price').value
  };

  data.items.push(item);
  localStorage.setItem('biabuData', JSON.stringify(data));
  loadItems();

  document.getElementById('title').value='';
  document.getElementById('desc').value='';
  document.getElementById('price').value='';
  document.getElementById('imgPreview').src='';
  document.getElementById('imgPreview').style.display='none';
  tempImg = '';
  alert('✅ Kazi imeongezwa!');
}

function deleteItem(index){
  if(confirm('Una uhakika unataka kufuta hii kazi?')){
    data.items.splice(index,1);
    localStorage.setItem('biabuData', JSON.stringify(data));
    loadItems();
  }
}

function loadItems(){
  const list = document.getElementById('itemsList');
  list.innerHTML='';
  if(data.items.length === 0){
    list.innerHTML = '<p style="color:#999;text-align:center;padding:20px;">Bado hakuna kazi. Anza kuongeza hapo juu</p>';
    return;
  }
  data.items.forEach((item,i)=>{
    list.innerHTML += `
      <div class="item">
        <img src="${item.img}">
        <div style="flex:1;">
          <strong style="font-size:1.1rem;">${item.title}</strong><br>
          <small style="color:#666;">${item.desc}</small><br>
          <strong style="color:#8B0000;font-size:1.2rem;">Tsh ${item.price}</strong>
        </div>
        <button class="delete" onclick="deleteItem(${i})">🗑️ Futa</button>
      </div>
    `;
  });
}

// Load data on start
document.getElementById('bizName').value = data.name;
document.getElementById('phone').value = data.phone;
document.getElementById('location').value = data.location;
if(data.logo){
  document.getElementById('logoPreview').src = data.logo;
  document.getElementById('logoPreview').style.display = 'block';
}
loadItems();
</script>
</div>
</body>
</html>
